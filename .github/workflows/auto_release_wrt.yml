name: Auto Release WRT

run-name: Release - ${{ github.event_name }}

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - README.md
      - .gitignore
      - .github/workflows/auto_release_wrt.yml
      - .github/workflows/release_wrt.yml

permissions: write-all

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

concurrency:
  group: wrt-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]

        model:
          - jdcloud_ax6000_immwrt
          - jdcloud_ipq60xx_immwrt
          - jdcloud_ipq60xx_libwrt
          - link_nn6000v2_immwrt
          - x64_immwrt

    runs-on: ${{ matrix.os }}

    steps:

      - name: Set MODEL
        run: |
          echo "MODEL=${{ matrix.model }}" >> $GITHUB_ENV

      - name: Build System Setup
        run: |
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install dos2unix
          sudo -E apt -yqq install libfuse-dev
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E systemctl daemon-reload

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Grant execute permission
        run: |
          find . -name "*.sh" -exec chmod +x {} \;

      - name: Set Build Date and Timezone
        run: |
          sudo -E timedatectl set-timezone "Asia/Shanghai"

          BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d_%H.%M.%S")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV

          BUILD_SRC=$(awk -F"=" '/REPO_URL/ {print $NF}' "./wrt_core/compilecfg/${MODEL}.ini")
          echo "BUILD_SRC=$BUILD_SRC" >> $GITHUB_ENV

      - name: Pre Clone
        run: |
          ./wrt_core/pre_clone_action.sh ${MODEL}

      - name: Cache Dependencies
        uses: actions/cache@v5.0.2
        with:
          path: |
            ./action_build/.ccache
            ./action_build/staging_dir
          key: ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}-${{ env.MODEL }}
          restore-keys: |
            ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}-

      - name: Refresh the cache
        run: |
          if [ -d "./action_build/staging_dir" ]; then
            find "./action_build/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
                find "$dir" -type f -exec touch {} +
            done
          fi

      - name: Machine Information (Pre-build)
        run: |
          echo "=============== Pre-build Snapshot ==============="
          echo "Time: $(date '+%F %T %Z')"
          echo "Runner: ${RUNNER_NAME} (${RUNNER_OS}/${RUNNER_ARCH})"
          echo "Kernel: $(uname -r)"
          echo "Uptime: $(uptime -p)"
          echo "=================================================="
          echo "[CPU]"
          lscpu | grep -E "Model name|Architecture|CPU\\(s\\)|Thread\\(s\\) per core|Core\\(s\\) per socket|CPU max MHz"
          echo "=================================================="
          echo "[Memory]"
          free -h
          echo "=================================================="
          echo "[Disk]"
          df -hT
          echo "--------------------------------------------------"
          df -hi
          echo "=================================================="
          echo "[Workspace]"
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
          du -sh "${GITHUB_WORKSPACE}" 2>/dev/null || true
          du -sh ./action_build/.ccache 2>/dev/null || true
          du -sh ./action_build/staging_dir 2>/dev/null || true
          du -sh ./firmware 2>/dev/null || true
          echo "=================================================="

      - name: Build Firmware
        run: |
          ./build.sh ${MODEL}

      - name: Get Kernel Version
        run: |
          echo "KVER=$(grep -oP "^kernel.*" ./firmware/*.manifest | grep -oP "[4-6]\.[0-9]{1,3}\.[0-9]{1,3}")" >> $GITHUB_ENV

      - name: Delete Old Cache
        run: |
          gh cache list \
            --key ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}- \
            --json key \
            --jq '.[] | .key' \
          | while read -r key; do
              gh cache delete "$key"
            done

          echo "========cache status========"
          echo "ccache: $(du -sh ./action_build/.ccache | cut -f 1)"
          echo "staging: $(du -sh ./action_build/staging_dir | cut -f 1)"
      
      - name: Machine Information (Post-build)
        run: |
          echo "=============== Post-build Snapshot ==============="
          echo "Time: $(date '+%F %T %Z')"
          echo "Runner: ${RUNNER_NAME} (${RUNNER_OS}/${RUNNER_ARCH})"
          echo "Kernel: $(uname -r)"
          echo "Uptime: $(uptime -p)"
          echo "===================================================="
          echo "[CPU]"
          lscpu | grep -E "Model name|Architecture|CPU\\(s\\)|Thread\\(s\\) per core|Core\\(s\\) per socket|CPU max MHz"
          echo "===================================================="
          echo "[Memory]"
          free -h
          echo "===================================================="
          echo "[Disk]"
          df -hT
          echo "----------------------------------------------------"
          df -hi
          echo "===================================================="
          echo "[Build Outputs]"
          du -sh ./action_build/.ccache 2>/dev/null || true
          du -sh ./action_build/staging_dir 2>/dev/null || true
          du -sh ./firmware 2>/dev/null || true
          echo "Firmware file count: $(ls -1 ./firmware 2>/dev/null | wc -l)"
          echo "===================================================="

      - name: Prepare Release Body
        if: success()
        run: |

          PLUGINS=$(grep -h -oP "luci-app(-[a-zA-Z0-9]{1,}){1,}" ./firmware/*.manifest 2>/dev/null \
            | sort -u \
            | sed 's/^/- /' \
            | paste -d '' - - - \
            | sed 's/\t/  /g')

          if [ -z "$PLUGINS" ]; then
            PLUGINS="- No plugins installed"
          fi

          cat > release_body.txt <<EOF
          🚀 ImmortalWrt Cloud Build

          💾 Source Code: \`${BUILD_SRC}\`
          ⚙️ Kernel Version: ${KVER}

          🔧 Default Configuration
          - WiFi Password: \`12345678\`
          - LAN Address: \`10.0.0.1\`

          🧩 Installed Plugins

          \`\`\`
          ${PLUGINS}
          \`\`\`

          EOF

      - name: Release Firmware
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ env.BUILD_DATE }}_${{ env.MODEL }}
          files: ./firmware/*.*
          body_path: ./release_body.txt

      # 清理旧 Release（保留2个）
      - name: Cleanup Old Releases
        if: success()
        run: |
          KEEP=2

          gh release list --limit 200 --json tagName,publishedAt \
            | jq -r ".[] | select(.tagName | contains(\"${MODEL}\")) | \"\(.publishedAt) \(.tagName)\"" \
            | sort -r \
            | awk "NR>$KEEP {print \$2}" \
            | while read tag; do
                echo "Deleting $tag"
                gh release delete "$tag" --yes --cleanup-tag
              done

      # 清理 Workflow Runs（保留10条）
      - name: Cleanup Old Workflow Runs
        if: success()
        run: |
          KEEP=10

          gh run list \
            --limit 200 \
            --status completed \
            --json databaseId,createdAt \
            | jq -r '.[] | "\(.createdAt) \(.databaseId)"' \
            | sort -r \
            | awk "NR>$KEEP {print \$2}" \
            | while read run_id; do
                echo "Deleting workflow run $run_id"
                gh api \
                  -X DELETE \
                  repos/${{ github.repository }}/actions/runs/$run_id
              done