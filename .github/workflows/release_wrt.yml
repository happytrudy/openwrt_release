name: Release WRT
run-name: Release - ${{ inputs.model }}

on:
  workflow_dispatch:
    inputs:
      model:
        required: true
        description: Device Model
        type: choice
        default: jdcloud_ipq60xx_immwrt
        options:
          - jdcloud_ipq60xx_immwrt
          - jdcloud_ipq60xx_libwrt
          - x64_immwrt

permissions: write-all

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Free disk space
        uses: sbwml/actions@free-disk

      - name: Build System Setup
        run: |
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install dos2unix libfuse-dev
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E systemctl daemon-reload

      - name: Checkout
        uses: actions/checkout@v4

      - name: Grant execute permissions to scripts
        run: |
          find . -name "*.sh" -exec chmod +x {} \;

      - name: Set Build Date and Timezone
        run: |
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d_%H.%M.%S")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          BUILD_SRC=$(awk -F"=" '/REPO_URL/ {print $NF}' "./wrt_core/compilecfg/${{ inputs.model }}.ini")
          echo "BUILD_SRC=$BUILD_SRC" >> $GITHUB_ENV

      - name: Pre Clone
        run: ./wrt_core/pre_clone_action.sh ${{ inputs.model }}

      # ✅ 修复后的缓存配置（不再使用 hashFiles）
      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ./action_build/.ccache
            ./action_build/staging_dir
          key: ${{ matrix.os }}-wrt-${{ inputs.model }}-${{ github.ref_name }}
          restore-keys: |
            ${{ matrix.os }}-wrt-${{ inputs.model }}-
            ${{ matrix.os }}-wrt-

      - name: Refresh the cache
        run: |
          if [ -d "./action_build/staging_dir" ]; then
            find "./action_build/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
                find "$dir" -type f -exec touch {} +
            done
          fi

      - name: Build Firmware
        run: ./build.sh ${{ inputs.model }}

      - name: Get Kernel Version
        run: |
          KVER=$(grep -oP "^kernel.*" ./firmware/*.manifest | grep -oP "[4-6]\.[0-9]{1,3}\.[0-9]{1,3}")
          echo "KVER=$KVER" >> $GITHUB_ENV

      - name: Machine Information
        run: |
          echo "=============================================="
          lscpu | grep -E "name|Core|Thread"
          echo "=============================================="
          df -h
          echo "=============================================="

      - name: Prepare Release Body
        run: |
          cat > release_body.txt <<EOF
          🚀 **云编译发布**

          📦 **固件信息**
          - 内核版本：${{ env.KVER }}

          🔧 **默认配置**
          - WIFI 密码：\`12345678\`
          - LAN 地址：\`10.0.0.1\`

          🧩 **预装插件**
          $(grep -oP "luci-app(-[a-zA-Z0-9]{1,}){1,}" ./firmware/*.manifest | awk -F":" '{print "- " $NF}')
          EOF

      - name: Release Firmware
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BUILD_DATE }}_${{ inputs.model }}
          files: ./firmware/*.*
          body_path: ./release_body.txt
      
      - name: Auto Cleanup Old Cache
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "====== Listing caches for this model ======"

          PREFIX="${{ matrix.os }}-wrt-${{ inputs.model }}-"

          gh cache list --limit 100 --json key,createdAt \
            | jq -r '.[] | select(.key | startswith("'"$PREFIX"'")) | "\(.createdAt) \(.key)"' \
            | sort -r \
            | awk 'NR>1 {print $2}' \
            | while read -r oldkey; do
                echo "Deleting old cache: $oldkey"
                gh cache delete "$oldkey"
              done

          echo "====== Cleanup complete ======"

      - name: Machine Information
        run: |
          echo "=============================================="
          lscpu | grep -E "name|Core|Thread"
          echo "=============================================="
          df -h
          echo "=============================================="

      - name: Prepare Release Body
        run: |
          cat > release_body.txt <<EOF
          🚀 **云编译发布**

          📦 **固件信息**
          - 内核版本：${{ env.KVER }}

          🔧 **默认配置**
          - WIFI 密码：\`12345678\`
          - LAN 地址：\`10.0.0.1\`

          🧩 **预装插件**
          $(grep -oP "luci-app(-[a-zA-Z0-9]{1,}){1,}" ./firmware/*.manifest | awk -F":" '{print "- " $NF}')
          EOF

      - name: Release Firmware
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ env.BUILD_DATE }}_${{ inputs.model }}
          files: ${{ inputs.model == 'n1_immwrt' && env.PACKAGED_OUTPUTPATH || './firmware' }}/*.*
          body_path: ./release_body.txt